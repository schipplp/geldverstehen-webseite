name: Deploy to GitHub Pages

on:
  # Bei jedem Push auf main bauen und veröffentlichen
  push:
    branches: [main]
  # Täglicher Rebuild, damit neue Podcast-Folgen aus dem RSS-Feed
  # automatisch auf der Seite erscheinen (Build lädt den Feed neu).
  schedule:
    - cron: '0 5 * * *'
  # Manuelles Auslösen im Actions-Tab erlauben
  workflow_dispatch:

# Berechtigungen für das GitHub-Pages-Deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein gleichzeitiges Deployment; laufende Läufe nicht abbrechen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build with Astro
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
