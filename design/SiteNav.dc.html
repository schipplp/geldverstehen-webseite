<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/geld-verstehen-cb9890e3-c9d6-46fe-bfb7-737cb9ea462c/tokens/fonts.css">
<link rel="stylesheet" href="_ds/geld-verstehen-cb9890e3-c9d6-46fe-bfb7-737cb9ea462c/tokens/colors.css">
<link rel="stylesheet" href="_ds/geld-verstehen-cb9890e3-c9d6-46fe-bfb7-737cb9ea462c/tokens/typography.css">
<link rel="stylesheet" href="_ds/geld-verstehen-cb9890e3-c9d6-46fe-bfb7-737cb9ea462c/tokens/spacing.css">
<link rel="stylesheet" href="_ds/geld-verstehen-cb9890e3-c9d6-46fe-bfb7-737cb9ea462c/styles.css">
<style>
  .gv-nv { position:relative; }
  .gv-nv-wrap { max-width:1120px; margin:0 auto; padding:0 40px; }
  .gv-nv-links { display:flex; align-items:center; gap:24px; }
  .gv-nv-a { font-family:var(--font-display); font-size:16px; letter-spacing:.05em; color:rgba(255,255,255,.82); text-decoration:none; cursor:pointer; transition:color .15s ease; white-space:nowrap; }
  .gv-nv-a:hover { color:#fff; }
  .gv-nv-active { color:var(--gv-yellow); }
  .gv-nv-cta { display:inline-block; font-family:var(--font-body); font-weight:700; font-size:14px; text-decoration:none; background:var(--gv-yellow); color:var(--gv-ink); border-radius:8px; padding:10px 18px; white-space:nowrap; transition:background .15s ease; }
  .gv-nv-cta:hover { background:var(--gv-yellow-600); }
  .gv-nv-burger { display:none; flex-direction:column; justify-content:center; gap:5px; width:42px; height:42px; padding:9px; background:rgba(255,255,255,.10); border:none; border-radius:8px; cursor:pointer; }
  .gv-nv-burger span { display:block; width:100%; height:2px; background:#fff; border-radius:2px; }
  @media (max-width: 860px) {
    .gv-nv-wrap { padding:0 22px; }
    .gv-nv-burger { display:flex; }
    .gv-nv-links { display:none; position:absolute; left:0; right:0; top:100%; flex-direction:column; align-items:stretch; gap:0; background:var(--gv-blue); padding:6px 0 16px; box-shadow:0 24px 48px rgba(0,0,0,.32); z-index:60; }
    .gv-nv-links.open { display:flex; }
    .gv-nv-links .gv-nv-a { font-size:18px; padding:15px 22px; border-top:1px solid rgba(255,255,255,.12); }
    .gv-nv-ctawrap { padding:14px 22px 0; }
    .gv-nv-cta { display:block; text-align:center; }
  }
</style>
</helmet>
<div style="background:var(--gv-blue);">
  <div class="gv-nv-wrap gv-nv" style="display:flex; align-items:center; justify-content:space-between; gap:20px; padding-top:15px; padding-bottom:15px;">
    <a href="Startseite.dc.html" style="text-decoration:none; font-family:var(--font-display); font-size:24px; line-height:1; letter-spacing:.5px;"><span style="color:#fff;">GELD</span><span style="color:var(--gv-yellow);">VERSTEHEN</span></a>
    <button class="gv-nv-burger" onClick="{{ toggleMenu }}" aria-label="Menü öffnen"><span></span><span></span><span></span></button>
    <div class="gv-nv-links {{ menuClass }}">
      <a class="gv-nv-a {{ podcastActive }}" href="Podcast.dc.html">PODCAST</a>
      <a class="gv-nv-a {{ appActive }}" href="App.dc.html">APP</a>
      <a class="gv-nv-a {{ buchActive }}" href="Buch.dc.html">BUCH</a>
      <a class="gv-nv-a {{ ueberActive }}" href="Ueber.dc.html">ÜBER</a>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 72 },
  &quot;active&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;&quot;, &quot;ueber&quot;, &quot;podcast&quot;, &quot;app&quot;], &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  state = { menuOpen: false };
  toggleMenu = () => this.setState(s => ({ menuOpen: !s.menuOpen }));
  renderVals() {
    const a = this.props.active || '';
    return {
      menuClass: this.state.menuOpen ? 'open' : '',
      toggleMenu: this.toggleMenu,
      ueberActive: a === 'ueber' ? 'gv-nv-active' : '',
      podcastActive: a === 'podcast' ? 'gv-nv-active' : '',
      appActive: a === 'app' ? 'gv-nv-active' : '',
      buchActive: a === 'buch' ? 'gv-nv-active' : '',
    };
  }
}
</script>
</body>
</html>
